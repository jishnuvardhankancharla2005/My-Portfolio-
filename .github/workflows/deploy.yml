name: Deploy Portfolio CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-type: 'node'
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Application
      run: npm run build

    - name: Verify Build Output
      run: |
        if [ ! -d "dist" ]; then
          echo "Error: dist build output directory not found!"
          exit 1
        fi
        echo "Build compiled successfully. Artifacts verified."
